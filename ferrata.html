        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[40.926283742700534,-1.4295373489655423],[42.81594667442953,3.1607306724127455]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_GoogleSatellite_0');
        map.getPane('pane_GoogleSatellite_0').style.zIndex = 400;
        var layer_GoogleSatellite_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleSatellite_0',
            opacity: 1.0,
            attribution: '<a href="https://www.google.at/permissions/geoguidelines/attr-guide.html">Map data ©2015 Google</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        layer_GoogleSatellite_0;
        map.addLayer(layer_GoogleSatellite_0);
        function pop_ViasFerratasCatalunya_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Nivel</th>\
                        <td class="visible-with-data" id="Nivel">' + (feature.properties['Nivel'] !== null ? autolinker.link(String(feature.properties['Nivel']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Ubicación</th>\
                        <td class="visible-with-data" id="Ubicación">' + (feature.properties['Ubicación'] !== null ? autolinker.link(String(feature.properties['Ubicación']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Duración</th>\
                        <td class="visible-with-data" id="Duración">' + (feature.properties['Duración'] !== null ? autolinker.link(String(feature.properties['Duración']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">UTM X</th>\
                        <td class="visible-with-data" id="UTM X">' + (feature.properties['UTM X'] !== null ? autolinker.link(String(feature.properties['UTM X']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">UTM Y</th>\
                        <td class="visible-with-data" id="UTM Y">' + (feature.properties['UTM Y'] !== null ? autolinker.link(String(feature.properties['UTM Y']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Nombre</th>\
                        <td class="visible-with-data" id="Nombre">' + (feature.properties['Nombre'] !== null ? autolinker.link(String(feature.properties['Nombre']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Destacado</th>\
                        <td class="visible-with-data" id="Destacado">' + (feature.properties['Destacado'] !== null ? autolinker.link(String(feature.properties['Destacado']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_ViasFerratasCatalunya_1_0(feature) {
            switch(String(feature.properties['Nivel'])) {
                case 'K1':

            }
                    break;
                case 'K2':
                    return {
                pane: 'pane_ViasFerratasCatalunya_1',
                radius: 8.0,
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(84,176,74,1.0)',
                interactive: true,
            }
                    break;
                case 'K2/K3':
                    return {
                pane: 'pane_ViasFerratasCatalunya_1',
                radius: 8.0,
                opacity: 1,
                color: 'rgba(42,161,242,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 4.0,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(84,176,74,1.0)',
                interactive: true,
            }
                    break;
                case 'K3':
                    return {
                pane: 'pane_ViasFerratasCatalunya_1',
                radius: 8.0,
                opacity: 1,
                color: 'rgba(50,87,128,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 2.0,

                fillOpacity: 1,
                fillColor: 'rgba(72,123,182,1.0)',
                interactive: true,
            }
                    break;
                case 'K3/K4':
                    return {
                pane: 'pane_ViasFerratasCatalunya_1',

                opacity: 1,
                color: 'rgba(255,255,0,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 4.0,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(72,123,182,1.0)',
                interactive: true,
            }
                    break;
                case 'K4':
                    return {
                pane: 'pane_ViasFerratasCatalunya_1',
                radius: 8.0,
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(250,255,57,1.0)',
                interactive: true,
            }
                    break;
                case 'K4/K5':
                    return {
                pane: 'pane_ViasFerratasCatalunya_1',
                radius: 8.0,
                opacity: 1,
                color: 'rgba(211,109,63,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 3.0,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(250,255,57,1.0)',
                interactive: true,
            }
                    break;
                case 'K5':
                    return {
                pane: 'pane_ViasFerratasCatalunya_1',
                radius: 8.0,
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(247,128,30,1.0)',
                interactive: true,
            }
                    break;
                case 'K6':
                    return {
                pane: 'pane_ViasFerratasCatalunya_1',
                radius: 8.0,
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(219,30,42,1.0)',
                interactive: true,
            }
                    break;
                case 'K7+':
                    return {
                pane: 'pane_ViasFerratasCatalunya_1',
                radius: 8.0,
                stroke: false,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(87,43,163,1.0)',
                interactive: true,
            }
                    break;
            }
        }
        map.createPane('pane_ViasFerratasCatalunya_1');
        map.getPane('pane_ViasFerratasCatalunya_1').style.zIndex = 401;
        map.getPane('pane_ViasFerratasCatalunya_1').style['mix-blend-mode'] = 'normal';
        var layer_ViasFerratasCatalunya_1 = new L.geoJson(json_ViasFerratasCatalunya_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_ViasFerratasCatalunya_1',
            layerName: 'layer_ViasFerratasCatalunya_1',
            pane: 'pane_ViasFerratasCatalunya_1',
            onEachFeature: pop_ViasFerratasCatalunya_1,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_ViasFerratasCatalunya_1_0(feature));
            },
        });
        bounds_group.addLayer(layer_ViasFerratasCatalunya_1);
        map.addLayer(layer_ViasFerratasCatalunya_1);
        var overlaysTree = [
            {label: 'Vias Ferratas Catalunya<br /><table><tr><td style="text-align: center;"><img src="legend/ViasFerratasCatalunya_1_K10.png" /></td><td>K1</td></tr><tr><td style="text-align: center;"><img src="legend/ViasFerratasCatalunya_1_K21.png" /></td><td>K2</td></tr><tr><td style="text-align: center;"><img src="legend/ViasFerratasCatalunya_1_K2K32.png" /></td><td>K2/K3</td></tr><tr><td style="text-align: center;"><img src="legend/ViasFerratasCatalunya_1_K33.png" /></td><td>K3</td></tr><tr><td style="text-align: center;"><img src="legend/ViasFerratasCatalunya_1_K3K44.png" /></td><td>K3/K4</td></tr><tr><td style="text-align: center;"><img src="legend/ViasFerratasCatalunya_1_K45.png" /></td><td>K4</td></tr><tr><td style="text-align: center;"><img src="legend/ViasFerratasCatalunya_1_K4K56.png" /></td><td>K4/K5</td></tr><tr><td style="text-align: center;"><img src="legend/ViasFerratasCatalunya_1_K57.png" /></td><td>K5</td></tr><tr><td style="text-align: center;"><img src="legend/ViasFerratasCatalunya_1_K68.png" /></td><td>K6</td></tr><tr><td style="text-align: center;"><img src="legend/ViasFerratasCatalunya_1_K79.png" /></td><td>K7+</td></tr></table>', layer: layer_ViasFerratasCatalunya_1},
            {label: "Google Satellite", layer: layer_GoogleSatellite_0, radioGroup: 'bm' },]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        var i = 0;
        layer_ViasFerratasCatalunya_1.eachLayer(function(layer) {
            var context = {
                feature: layer.feature,
                variables: {}
            };
            layer.bindTooltip((layer.feature.properties['Nivel'] !== null?String('<div style="color: #323232; font-size: 10pt; font-weight: bold; font-family: \'Calibri\', sans-serif;">' + layer.feature.properties['Nivel']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_ViasFerratasCatalunya_1'});
            labels.push(layer);
            totalMarkers += 1;
              layer.added = true;
              addLabel(layer, i);
              i++;
        });
        resetLabels([layer_ViasFerratasCatalunya_1]);
        map.on("zoomend", function(){
            resetLabels([layer_ViasFerratasCatalunya_1]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_ViasFerratasCatalunya_1]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_ViasFerratasCatalunya_1]);
        });
        </script>
